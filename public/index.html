<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sneup - AI-Powered Project Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .card h2 {
            color: #333;
            font-size: 1.5em;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .icon {
            font-size: 1.5em;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .metric:last-child {
            border-bottom: none;
        }

        .metric-label {
            color: #666;
            font-size: 0.95em;
        }

        .metric-value {
            font-size: 1.3em;
            font-weight: bold;
            color: #667eea;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
        }

        .status-healthy {
            background: #d4edda;
            color: #155724;
        }

        .status-at-risk {
            background: #fff3cd;
            color: #856404;
        }

        .status-critical {
            background: #f8d7da;
            color: #721c24;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1em;
        }

        .btn:hover {
            background: #5568d3;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }

        .board-list {
            list-style: none;
        }

        .board-item {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .board-item:last-child {
            border-bottom: none;
        }

        .board-name {
            font-weight: 500;
            color: #333;
        }

        footer {
            text-align: center;
            color: white;
            padding: 20px;
            margin-top: 30px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 Sneup</h1>
            <p class="subtitle">Autonomous AI-Powered Digital Project Manager for Trello</p>
        </header>

        <div id="app">
            <div class="loading">
                <h2>Loading dashboard...</h2>
                <p>Connecting to Sneup API...</p>
            </div>
        </div>

        <footer>
            <p>Sneup v1.0.0 - Built with ❤️ using battle-tested open source libraries</p>
            <p style="margin-top: 10px; font-size: 0.9em;">
                Powered by trello.js, natural, node-schedule, mongoose, express & winston
            </p>
        </footer>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';

        async function fetchBoards() {
            try {
                const response = await fetch(`${API_BASE}/boards`);
                const data = await response.json();
                return data.boards || [];
            } catch (error) {
                console.error('Failed to fetch boards:', error);
                return [];
            }
        }

        async function fetchCriticalBoards() {
            try {
                const response = await fetch(`${API_BASE}/analytics/critical`);
                const data = await response.json();
                return data.boards || [];
            } catch (error) {
                console.error('Failed to fetch critical boards:', error);
                return [];
            }
        }

        async function syncBoard(boardId) {
            try {
                const response = await fetch(`${API_BASE}/boards/${boardId}/sync`, {
                    method: 'POST'
                });
                const data = await response.json();
                if (data.success) {
                    alert('Board synced successfully!');
                    loadDashboard();
                } else {
                    alert('Failed to sync board');
                }
            } catch (error) {
                console.error('Failed to sync board:', error);
                alert('Error syncing board');
            }
        }

        async function generateAnalytics(boardId) {
            try {
                const response = await fetch(`${API_BASE}/analytics/board/${boardId}/generate`, {
                    method: 'POST'
                });
                const data = await response.json();
                if (data.success) {
                    alert('Analytics generated successfully!');
                    loadDashboard();
                } else {
                    alert('Failed to generate analytics');
                }
            } catch (error) {
                console.error('Failed to generate analytics:', error);
                alert('Error generating analytics');
            }
        }

        function renderDashboard(boards, criticalBoards) {
            const app = document.getElementById('app');
            
            const healthyBoards = boards.length - criticalBoards.length;
            const totalBoards = boards.length;

            app.innerHTML = `
                <div class="dashboard-grid">
                    <div class="card">
                        <h2><span class="icon">📊</span> Overview</h2>
                        <div class="metric">
                            <span class="metric-label">Total Boards</span>
                            <span class="metric-value">${totalBoards}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Healthy Boards</span>
                            <span class="metric-value" style="color: #28a745;">${healthyBoards}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Critical Boards</span>
                            <span class="metric-value" style="color: #dc3545;">${criticalBoards.length}</span>
                        </div>
                    </div>

                    <div class="card">
                        <h2><span class="icon">🎯</span> System Status</h2>
                        <div class="metric">
                            <span class="metric-label">API Status</span>
                            <span class="status-badge status-healthy">Online</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Sync Status</span>
                            <span class="status-badge status-healthy">Active</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Analytics</span>
                            <span class="status-badge status-healthy">Running</span>
                        </div>
                    </div>

                    <div class="card">
                        <h2><span class="icon">🤖</span> AI Features</h2>
                        <div class="metric">
                            <span class="metric-label">NLP Analysis</span>
                            <span class="status-badge status-healthy">Enabled</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Bottleneck Detection</span>
                            <span class="status-badge status-healthy">Active</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Team Management</span>
                            <span class="status-badge status-healthy">Active</span>
                        </div>
                    </div>
                </div>

                ${criticalBoards.length > 0 ? `
                <div class="card" style="margin-bottom: 30px;">
                    <h2><span class="icon">⚠️</span> Critical Boards Requiring Attention</h2>
                    <ul class="board-list">
                        ${criticalBoards.map(board => `
                            <li class="board-item">
                                <span class="board-name">${board.boardId?.name || 'Unknown Board'}</span>
                                <span class="status-badge status-critical">Critical</span>
                            </li>
                        `).join('')}
                    </ul>
                </div>
                ` : ''}

                <div class="card">
                    <h2><span class="icon">📋</span> All Boards</h2>
                    ${boards.length > 0 ? `
                        <ul class="board-list">
                            ${boards.map(board => `
                                <li class="board-item">
                                    <div>
                                        <div class="board-name">${board.name}</div>
                                        <div style="font-size: 0.85em; color: #666; margin-top: 4px;">
                                            ${board.members?.length || 0} members
                                        </div>
                                    </div>
                                    <div style="display: flex; gap: 8px;">
                                        <button class="btn" onclick="viewBoard('${board._id}')" style="padding: 8px 16px; font-size: 0.9em;">
                                            View
                                        </button>
                                        <button class="btn btn-secondary" onclick="syncBoard('${board._id}')" style="padding: 8px 16px; font-size: 0.9em;">
                                            Sync
                                        </button>
                                    </div>
                                </li>
                            `).join('')}
                        </ul>
                    ` : '<p style="color: #666; padding: 20px; text-align: center;">No boards found. Make sure Sneup is connected to your Trello account.</p>'}
                </div>

                <div class="card">
                    <h2><span class="icon">⚙️</span> Quick Actions</h2>
                    <div class="action-buttons">
                        <button class="btn" onclick="loadDashboard()">
                            🔄 Refresh Dashboard
                        </button>
                        <a href="/api/boards" class="btn btn-secondary" target="_blank">
                            📡 View API
                        </a>
                        <a href="https://github.com/Noodzakelijk-Online/sneup" class="btn btn-secondary" target="_blank">
                            📚 Documentation
                        </a>
                    </div>
                </div>
            `;
        }

        function viewBoard(boardId) {
            window.location.href = `/board.html?id=${boardId}`;
        }

        async function loadDashboard() {
            const app = document.getElementById('app');
            app.innerHTML = '<div class="loading"><h2>Loading dashboard...</h2></div>';

            try {
                const [boards, criticalBoards] = await Promise.all([
                    fetchBoards(),
                    fetchCriticalBoards()
                ]);

                renderDashboard(boards, criticalBoards);
            } catch (error) {
                console.error('Failed to load dashboard:', error);
                app.innerHTML = `
                    <div class="error">
                        <h2>Failed to Load Dashboard</h2>
                        <p>Error: ${error.message}</p>
                        <p>Make sure the Sneup API server is running and accessible.</p>
                        <button class="btn" onclick="loadDashboard()" style="margin-top: 15px;">
                            Retry
                        </button>
                    </div>
                `;
            }
        }

        // Load dashboard on page load
        loadDashboard();

        // Auto-refresh every 60 seconds
        setInterval(loadDashboard, 60000);
    </script>
</body>
</html>
